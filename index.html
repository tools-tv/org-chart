<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f7;color:#1a1a1a;min-height:100vh}
.topbar{background:#1a0a2e;border-bottom:3px solid #6b21d9;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:0.5px}
.topbar-sub{font-size:11px;color:#9b4dff}
.search-wrap{padding:12px 16px;background:#fff;border-bottom:1px solid #e5e5e5}
.search-wrap input{width:100%;padding:9px 14px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;color:#1a1a1a;font-size:13px;outline:none}
.search-wrap input::placeholder{color:#aaa}
.search-wrap input:focus{border-color:#6b21d9;background:#fff}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e5e5e5;padding:0 12px}
.tab{padding:12px 16px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;white-space:nowrap;color:#999;transition:all 0.2s;letter-spacing:0.3px}
.tab:hover{color:#333}
.tab.active{color:#1a1a1a;border-bottom-color:var(--tc)}
.chart-wrap{overflow:auto;padding:30px 20px;min-height:calc(100vh - 180px);background:#f5f5f7}
.chart-inner{display:inline-flex;flex-direction:column;align-items:center;min-width:max-content}
.node-col{display:flex;flex-direction:column;align-items:center}
.children-row{display:flex;flex-direction:row;gap:8px;align-items:flex-start;position:relative}
.v-line{width:2px;background:var(--lc,#ccc)}
.h-line{height:2px;background:var(--lc,#ccc);position:absolute;top:0;left:50%;transform:translateX(-50%)}
.card{border-radius:12px;padding:12px 10px 10px;width:128px;text-align:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border:1.5px solid;position:relative;background:#fff}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;margin:0 auto 7px}
.card-name{font-size:11px;font-weight:600;line-height:1.35;color:#1a1a1a}
.card-role{font-size:10px;margin-top:3px;line-height:1.3;color:#666}
.card-toggle{font-size:9px;margin-top:5px;color:#999}
.dept-badge{font-size:9px;padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block}
.search-results{padding:16px;display:flex;flex-wrap:wrap;gap:10px}
.result-card{border-radius:12px;padding:12px;width:170px;border:1.5px solid;background:#fff}
.result-name{font-size:13px;font-weight:600}
.result-role{font-size:11px;margin-top:2px;color:#666}
.result-dept{font-size:10px;margin-top:3px;color:#999}
.result-mgr{font-size:10px;margin-top:4px;color:#bbb}
.footer{background:#fff;border-top:1px solid #e5e5e5;padding:12px 16px;display:flex;flex-wrap:wrap;gap:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#888}
.legend-dot{width:10px;height:10px;border-radius:3px}
.empty{padding:40px;text-align:center;color:#aaa;font-size:13px}
</style>
</head>

const byId = Object.fromEntries(PEOPLE.map(p=>[p.id,p]));
const getRpts = (id,pool) => pool.filter(p=>p.mgr===id);
const countAll = (id,pool) => getRpts(id,pool).reduce((s,r)=>s+1+countAll(r.id,pool),0);

const TABS = ["HoldCo","STR Cribs","STR Search","SHL Property Management","SHL Design & Proc","STR Investing"];

function Card({person,isRoot,collapsed,hasChildren,onToggle}){
  const b = BRANDS[person.co]||BRANDS["HoldCo"];
  const init = person.name.split(" ").map(w=>w[0]).slice(0,2).join("");
  const total = hasChildren ? countAll(person.id, PEOPLE.filter(p=>p.co===person.co)) : 0;
  return(
    <div className="card" onClick={onToggle}
      style={{background:isRoot?b.light:b.light, borderColor:isRoot?b.bg:b.border, borderWidth:isRoot?"2.5px":"1.5px"}}>
      <div className="avatar" style={{background:b.bg}}>
        {init}
      </div>
      <div className="card-name" style={{color:isRoot?b.text:"#1a1a1a"}}>{person.name}</div>
      <div className="card-role" style={{color:isRoot?b.text:"#666",fontWeight:isRoot?"600":"400"}}>{person.role}</div>
      <div className="dept-badge" style={{background:b.border+"55",color:b.text}}>
        {person.dept}
      </div>
      {hasChildren&&(
        <div className="card-toggle" style={{color:"#999"}}>
          {collapsed?`+ ${total} people`:"▲ collapse"}
        </div>
      )}
    </div>
  );
}

function Node({id,pool,isRoot=false}){
  const person = byId[id];
  if(!person) return null;
  const b = BRANDS[person.co]||BRANDS["HoldCo"];
  const children = getRpts(id,pool);
  const [collapsed,setCollapsed] = useState(countAll(id,pool)>8&&!isRoot);
  return(
    <div className="node-col">
      <Card person={person} isRoot={isRoot} collapsed={collapsed}
        hasChildren={children.length>0} onToggle={()=>setCollapsed(v=>!v)}/>
      {children.length>0&&!collapsed&&(
        <>
          <div className="v-line" style={{"--lc":b.border,height:16}}/>
          <div className="children-row" style={{"--lc":b.border}}>
            {children.length>1&&(
              <div className="h-line" style={{width:`calc(100% - 120px)`,"--lc":b.border}}/>
            )}
            {children.map(c=>(
              <div key={c.id} className="node-col">
                <div className="v-line" style={{"--lc":b.border,height:16}}/>
                <Node id={c.id} pool={pool}/>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("HoldCo");
  const [search,setSearch]=useState("");
  const b=BRANDS[tab]||BRANDS["HoldCo"];

  const pool = PEOPLE.filter(p=>p.co===tab);
  const roots = pool.filter(p=>!p.mgr||!pool.find(x=>x.id===p.mgr));

  const results = search.trim()
    ? PEOPLE.filter(p=>
        p.name.toLowerCase().includes(search.toLowerCase())||
        p.role.toLowerCase().includes(search.toLowerCase())||
        p.dept.toLowerCase().includes(search.toLowerCase()))
    : [];

  return(
    <div>
      <div className="topbar">
        <div className="topbar-logo">Company Wide Org Chart</div>
        <div className="topbar-sub">{PEOPLE.length} people · {TABS.length} companies</div>
      </div>
      <div className="search-wrap">
        <input placeholder="Search name, role, or department..."
          value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="tabs">
        {TABS.map(t=>{
          const tb=BRANDS[t];
          return(
            <button key={t} className={`tab${tab===t?" active":""}`}
              onClick={()=>{setTab(t);setSearch("");}}
              style={{"--tc":tb.bg,color:tab===t?tb.bg:"#666"}}>
              {tb.label}
            </button>
          );
        })}
      </div>
      {search.trim()?(
        <div className="search-results">
          {results.length===0&&<div className="empty">No results for "{search}"</div>}
          {results.map(p=>{
            const pb=BRANDS[p.co]||BRANDS["HoldCo"];
            const mgr=p.mgr?byId[p.mgr]:null;
            return(
              <div key={p.id} className="result-card"
                style={{background:pb.light,borderColor:pb.border}}>
                <div className="result-name" style={{color:pb.text}}>{p.name}</div>
                <div className="result-role" style={{color:"#aaa"}}>{p.role}</div>
                <div className="result-dept" style={{color:"#666"}}>{p.dept} · {p.co}</div>
                {mgr&&<div className="result-mgr" style={{color:"#555"}}>↑ {mgr.name}</div>}
              </div>
            );
          })}
        </div>
      ):(
        <div className="chart-wrap">
          <div className="chart-inner">
            {roots.length===0?(
              <div className="empty">No data for this company</div>
            ):roots.length===1?(
              <Node id={roots[0].id} pool={pool} isRoot={true}/>
            ):(
              <div style={{display:"flex",gap:24,alignItems:"flex-start"}}>
                {roots.map(r=><Node key={r.id} id={r.id} pool={pool} isRoot={true}/>)}
              </div>
            )}
          </div>
        </div>
      )}
      <div className="footer">
        {Object.entries(BRANDS).map(([co,b])=>(
          <div key={co} className="legend-item">
            <div className="legend-dot" style={{background:b.bg}}/>
            {co}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
