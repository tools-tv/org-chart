  .header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { color: #fff; font-size: 18px; font-weight: 600; }
  .header span { color: #aaa; font-size: 12px; }
  .tabs { background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; overflow-x: auto; padding: 0 16px; }
  .tab { padding: 12px 16px; font-size: 12px; cursor: pointer; border: none; background: transparent; border-bottom: 3px solid transparent; white-space: nowrap; font-weight: 400; color: #666; }
  .tab.active { font-weight: 600; }
  .search-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; }
  .search-bar input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; outline: none; }
  .chart-area { overflow: auto; padding: 30px 20px; min-height: calc(100vh - 160px); }
  .chart-inner { display: inline-flex; flex-direction: column; align-items: center; min-width: max-content; }
  .node-wrap { display: flex; flex-direction: column; align-items: center; }
  .card { border-radius: 10px; padding: 10px 10px 8px; min-width: 110px; max-width: 130px; text-align: center; border: 1.5px solid; cursor: pointer; transition: opacity 0.15s; }
  .card:hover { opacity: 0.85; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; margin: 0 auto 6px; }
  .card-name { font-size: 11px; font-weight: 600; line-height: 1.3; }
  .card-role { font-size: 10px; margin-top: 3px; line-height: 1.3; }
  .card-toggle { font-size: 9px; margin-top: 4px; }
  .connector-v { width: 1.5px; height: 14px; }
  .connector-h { height: 1.5px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
  .children-wrap { display: flex; flex-direction: row; gap: 6px; align-items: flex-start; position: relative; }
  .child-col { display: flex; flex-direction: column; align-items: center; }
  .search-results { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
  .result-card { border-radius: 10px; padding: 10px 12px; min-width: 150px; border: 1.5px solid; }
  .result-name { font-size: 13px; font-weight: 600; }
  .result-role { font-size: 11px; color: #666; margin-top: 2px; }
  .result-co { font-size: 10px; color: #aaa; margin-top: 4px; }
  .result-mgr { font-size: 10px; color: #bbb; margin-top: 2px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px; background: #fff; border-top: 1px solid #e5e5e5; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .count { font-size: 10px; color: #888; margin-top: 2px; text-align: center; }

const byId = Object.fromEntries(ALL_PEOPLE.map(p => [p.id, p]));
const getReports = (id, pool) => pool.filter(p => p.mgr === id);
const countAll = (id, pool) => getReports(id, pool).reduce((s, r) => s + 1 + countAll(r.id, pool), 0);

function Card({ person, isRoot, collapsed, hasChildren, onToggle }) {
  const c = COLORS[person.co] || COLORS["HoldCo"];
  const init = person.name.split(" ").map(w => w[0]).slice(0,2).join("");
  return (
    <div className="node-wrap">
      <div className="card" onClick={onToggle}
        style={{ background: isRoot ? c.bg : c.light, borderColor: c.border }}>
        <div className="avatar" style={{ background: isRoot ? "rgba(255,255,255,0.2)" : c.bg }}>
          {init}
        </div>
        <div className="card-name" style={{ color: isRoot ? "#fff" : c.text }}>{person.name}</div>
        <div className="card-role" style={{ color: isRoot ? "rgba(255,255,255,0.75)" : "#777" }}>{person.role}</div>
        {hasChildren && (
          <div className="card-toggle" style={{ color: isRoot ? "rgba(255,255,255,0.6)" : c.text }}>
            {collapsed ? `+ show team` : "▲ collapse"}
          </div>
        )}
      </div>
    </div>
  );
}

function Node({ id, pool, isRoot = false }) {
  const person = byId[id];
  if (!person) return null;
  const c = COLORS[person.co] || COLORS["HoldCo"];
  const children = getReports(id, pool);
  const [collapsed, setCollapsed] = useState(!isRoot && countAll(id, pool) > 6);

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
      <Card person={person} isRoot={isRoot} collapsed={collapsed}
        hasChildren={children.length > 0} onToggle={() => setCollapsed(v => !v)} />
      {children.length > 0 && !collapsed && (
        <>
          <div className="connector-v" style={{ background: c.border }} />
          <div className="children-wrap">
            {children.length > 1 && (
              <div className="connector-h" style={{ background: c.border, width:`calc(100% - 110px)` }} />
            )}
            {children.map(child => (
              <div key={child.id} className="child-col">
                <div className="connector-v" style={{ background: c.border }} />
                <Node id={child.id} pool={pool} />
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("HoldCo");
  const [search, setSearch] = useState("");

  const pool = tab === "HoldCo" ? ALL_PEOPLE : ALL_PEOPLE.filter(p => p.co === tab);
  const rootId = TAB_ROOTS[tab];
  const searchResults = search.trim()
    ? ALL_PEOPLE.filter(p =>
        p.name.toLowerCase().includes(search.toLowerCase()) ||
        p.role.toLowerCase().includes(search.toLowerCase()))
    : [];

  return (
    <div>
      <div className="header">
        <h1>Techvestor Org Chart</h1>
        <span>{ALL_PEOPLE.length} people across {Object.keys(COLORS).length} companies</span>
      </div>
      <div className="search-bar">
        <input placeholder="Search any name or role..."
          value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="tabs">
        {Object.keys(COLORS).map(t => {
          const c = COLORS[t];
          return (
            <button key={t} className={`tab${tab===t?" active":""}`}
              onClick={() => { setTab(t); setSearch(""); }}
              style={{ borderBottomColor: tab===t ? c.bg:"transparent", color: tab===t ? c.bg:"#666" }}>
              {TAB_SHORT[t]}
            </button>
          );
        })}
      </div>
      {search.trim() ? (
        <div className="search-results">
          {searchResults.map(p => {
            const c = COLORS[p.co] || COLORS["HoldCo"];
            const mgr = p.mgr ? byId[p.mgr] : null;
            return (
              <div key={p.id} className="result-card"
                style={{ background: c.light, borderColor: c.border }}>
                <div className="result-name" style={{ color: c.text }}>{p.name}</div>
                <div className="result-role">{p.role}</div>
                <div className="result-co">{p.co}</div>
                {mgr && <div className="result-mgr">↑ {mgr.name}</div>}
              </div>
            );
          })}
          {searchResults.length === 0 && (
            <div style={{ color:"#aaa", fontSize:13, padding:8 }}>No results found</div>
          )}
        </div>
      ) : (
        <div className="chart-area">
          <div className="chart-inner">
            <Node id={rootId} pool={pool} isRoot={true} />
          </div>
        </div>
      )}
      <div className="legend">
        {Object.entries(COLORS).map(([co, c]) => (
          <div key={co} className="legend-item">
            <div className="legend-dot" style={{ background: c.bg }} />
            {co}
          </div>
        ))}
      </div>
    </div>
  );
}
